name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      # Core + dev group only. The optional extras ([search], [critique],
      # [ingest]) pull heavy or network-bound deps and aren't needed to run
      # the suite — the computable toolkit and pattern query stand alone.
      - name: Sync (core + dev)
        run: uv sync
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/ --output-format=github
      - name: Run tests
        run: uv run pytest -q
