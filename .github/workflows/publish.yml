# Publishes the `datavizier` distribution to PyPI via trusted publishing
# (OIDC — no stored API tokens). Triggered when a GitHub Release is published.
#
# PREREQUISITE: a trusted publisher is configured on PyPI for the project
# `datavizier` with:
#   owner "lavallee", repo "vizier", workflow "publish.yml",
#   environment "pypi-datavizier".
# The GitHub environment is created automatically on the first workflow run.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-datavizier
      url: https://pypi.org/p/datavizier
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # Idempotent re-runs: a version already on PyPI is skipped, not an
          # error — lets a re-dispatch complete a partial/failed publish.
          skip-existing: true
